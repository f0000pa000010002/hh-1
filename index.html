<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radeem App - Loading</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase.js"></script>
    <script type="module" src="auth.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--background-color);
        }
        .loading-page {
            text-align: center;
        }
        .loading-page h1 {
            margin-top: 20px;
            font-size: 2rem;
            color: var(--primary-color);
        }
        .loading-spinner {
            display: block; /* Override default hidden */
        }
    </style>
</head>
<body>
    <div class="loading-page">
        <div class="loading-spinner active"></div>
        <h1>Loading Radeem App...</h1>
        <p>Please wait</p>
    </div>
</body>
</html>
